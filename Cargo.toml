[package]
name = "unrpa-rs"
version = "0.1.0"
edition = "2021"

[dependencies]
clap = { version = "4.5.20", features = ["derive"] }
env_logger = "0.11.5"
log = "0.4.22"
serde = { version = "1.0.213", features = ["derive"] }
serde-pickle = "1.1.1"
serde_bytes = "0.11.15"
thiserror = "1.0.64"
zune-inflate = { version = "0.2.54", default-features = false, features = ["zlib"] }
